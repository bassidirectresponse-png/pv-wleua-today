<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none;user-select:none}
.txt{position:fixed;top:18%;width:100%;text-align:center;color:#ff1a1a;font-family:'Arial Black',Impact,sans-serif;font-size:clamp(1.8rem,6vw,5rem);font-weight:900;letter-spacing:.15em;text-shadow:0 0 15px #ff0000,0 0 40px #ff0000,0 0 80px rgba(255,0,0,.5),0 0 120px rgba(255,0,0,.3);animation:txtPulse .35s infinite alternate;z-index:10}
@keyframes txtPulse{0%{opacity:.75;transform:scale(1)}100%{opacity:1;transform:scale(1.03)}}
.scene{position:fixed;top:0;left:0;width:100%;height:100%;perspective:900px;perspective-origin:50% 65%}
.ground{position:absolute;bottom:0;width:100%;height:35%;background:linear-gradient(to top,rgba(255,0,0,.04),transparent)}
.track{position:absolute;top:50%;animation:run 3.2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes run{0%{left:-180px;transform:translateY(-50%) scaleX(1)}46%{left:calc(100vw + 80px);transform:translateY(-50%) scaleX(1)}50%{left:calc(100vw + 80px);transform:translateY(-50%) scaleX(-1)}96%{left:-180px;transform:translateY(-50%) scaleX(-1)}100%{left:-180px;transform:translateY(-50%) scaleX(1)}}
.rat{position:relative;width:160px;height:90px;transform-style:preserve-3d;transform:rotateX(-20deg) rotateY(25deg);animation:bob .12s infinite alternate}
@keyframes bob{0%{transform:rotateX(-20deg) rotateY(25deg) translateY(0)}100%{transform:rotateX(-20deg) rotateY(25deg) translateY(-6px)}}
.body{position:absolute;width:100px;height:52px;background:linear-gradient(170deg,#8a7a6a 0%,#6b5a48 60%,#4a3a2a 100%);border-radius:48% 55% 50% 45%;top:18px;left:35px;transform:translateZ(12px);box-shadow:inset 0 -12px 25px rgba(0,0,0,.35),0 10px 30px rgba(0,0,0,.7)}
.body::after{content:'';position:absolute;top:5px;left:15px;width:60%;height:35%;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent);border-radius:50%}
.head{position:absolute;width:44px;height:38px;background:linear-gradient(170deg,#9a8a78 0%,#7a6a58 100%);border-radius:55% 52% 48% 50%;top:12px;left:8px;transform:translateZ(18px);box-shadow:inset 0 -6px 12px rgba(0,0,0,.25)}
.snout{position:absolute;width:24px;height:18px;background:linear-gradient(180deg,#a8987a,#8a7a5a);border-radius:60% 60% 50% 50%;top:22px;left:-4px;transform:translateZ(24px)}
.nose{position:absolute;width:10px;height:8px;background:radial-gradient(#ffb0b0,#e88a8a);border-radius:50%;top:22px;left:-9px;transform:translateZ(28px);box-shadow:0 0 6px rgba(255,100,100,.4)}
.eye{position:absolute;width:7px;height:8px;background:radial-gradient(#000 60%,#111);border-radius:50%;transform:translateZ(22px)}.eye.l{top:14px;left:14px}.eye.r{top:14px;left:30px}
.eye::after{content:'';position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;top:1px;left:1px}
.eye::before{content:'';position:absolute;width:5px;height:3px;background:rgba(255,50,50,.3);border-radius:50%;bottom:-3px;left:1px;filter:blur(2px)}
.ear{position:absolute;width:22px;height:24px;background:linear-gradient(180deg,#8a7a68,#6a5a48);border-radius:50% 50% 40% 40%;box-shadow:inset 0 0 8px rgba(0,0,0,.2)}.ear::after{content:'';position:absolute;width:12px;height:14px;background:linear-gradient(180deg,#d4a8a8,#c09090);border-radius:50%;top:5px;left:5px}
.ear.l{top:0;left:10px;transform:translateZ(8px) rotate(-20deg)}.ear.r{top:0;left:30px;transform:translateZ(8px) rotate(20deg)}
.tail{position:absolute;width:90px;height:45px;border:3.5px solid transparent;border-top-color:#a89080;border-radius:50%/30px;top:22px;left:125px;transform:translateZ(6px) rotate(-12deg);animation:wag .18s infinite alternate;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
@keyframes wag{0%{transform:translateZ(6px) rotate(-18deg)}100%{transform:translateZ(6px) rotate(-4deg)}}
.wh{position:absolute;height:1px;background:rgba(200,180,160,.5);transform:translateZ(23px)}.wh1{width:28px;top:23px;left:-18px;transform:translateZ(23px) rotate(-12deg)}.wh2{width:25px;top:27px;left:-16px;transform:translateZ(23px) rotate(8deg)}.wh3{width:26px;top:23px;left:-14px;transform:translateZ(25px) rotate(-22deg)}.wh4{width:24px;top:27px;left:-12px;transform:translateZ(25px) rotate(16deg)}
.leg{position:absolute;width:9px;height:28px;background:linear-gradient(180deg,#6a5a48,#4a3a2a);border-radius:5px 5px 3px 3px;bottom:-18px;transform-origin:top center;box-shadow:0 3px 6px rgba(0,0,0,.4)}.leg.fl{left:40px;animation:lf .12s infinite alternate}.leg.fr{left:52px;animation:lf .12s infinite alternate-reverse}.leg.bl{left:108px;animation:lb .12s infinite alternate-reverse}.leg.br{left:120px;animation:lb .12s infinite alternate}
.leg::after{content:'';position:absolute;bottom:0;width:12px;height:5px;background:#5a4a38;border-radius:50% 60% 40% 30%;left:-1px}
@keyframes lf{0%{transform:rotate(-30deg)}100%{transform:rotate(30deg)}}
@keyframes lb{0%{transform:rotate(-35deg)}100%{transform:rotate(35deg)}}
.shadow{position:absolute;width:130px;height:22px;background:radial-gradient(ellipse,rgba(255,0,0,.12),transparent 70%);bottom:-30px;left:15px;border-radius:50%;filter:blur(6px);animation:shadowPulse .12s infinite alternate}
@keyframes shadowPulse{0%{opacity:.6;transform:scaleX(.9)}100%{opacity:1;transform:scaleX(1.1)}}
.scan{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:100}
.vig{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.85) 100%);pointer-events:none;z-index:99}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.p{position:absolute;width:2px;height:2px;background:rgba(255,0,0,.4);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}
</style>
</head>
<body>
<div class="txt">PEGA O RATOOOOO...</div>
<div class="scene">
<div class="ground"></div>
<div class="track">
<div class="rat">
<div class="ear l"></div>
<div class="ear r"></div>
<div class="head"></div>
<div class="eye l"></div>
<div class="eye r"></div>
<div class="snout"></div>
<div class="nose"></div>
<div class="wh wh1"></div>
<div class="wh wh2"></div>
<div class="wh wh3"></div>
<div class="wh wh4"></div>
<div class="body"></div>
<div class="tail"></div>
<div class="leg fl"></div>
<div class="leg fr"></div>
<div class="leg bl"></div>
<div class="leg br"></div>
<div class="shadow"></div>
</div>
</div>
</div>
<div class="particles" id="pts"></div>
<div class="vig"></div>
<div class="scan"></div>
<script>
var c=document.getElementById('pts');for(var i=0;i<30;i++){var p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(3+Math.random()*5)+'s';p.style.animationDelay=Math.random()*5+'s';c.appendChild(p)}
document.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('keydown',function(e){e.preventDefault()});
</script>
</body>
</html>
